<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms & Conditions — HeroAi</title>
    <link rel="stylesheet" href="brand.css">
    <script src="config.js"></script>
    <style>
        body { background: #06060A; color: #F1F1F8; font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .wrap { max-width: 900px; margin: 0 auto; background: #12121C; padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #F59E0B; margin-bottom: 30px; }
        #content { font-size: 14px; color: #9090A8; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Terms & Conditions</h1>
        <div id="content">Loading legal directives...</div>
        <a href="index.html" style="color:#22D3EE; display:block; margin-top:50px;">&larr; Back to Dashboard</a>
    </div>

    <script>
        async function loadTerms() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/system/public`);
                const data = await res.json();
                document.getElementById('content').innerHTML = data.termsAndConditions || 'Terms apply.';
            } catch(e) { console.error("Failed to load Terms."); }
        }
        loadTerms();
    </script>
</body>
</html>
