<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us — HeroAi</title>
    <link rel="stylesheet" href="brand.css">
    <script src="config.js"></script>
    <style>
        body { background: #06060A; color: #F1F1F8; font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .wrap { max-width: 900px; margin: 0 auto; background: #12121C; padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #22D3EE; margin-bottom: 30px; font-size: 42px; }
        #content { font-size: 18px; color: #9090A8; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>About HeroAi</h1>
        <div id="content">Loading story...</div>
        <a href="index.html" style="color:#F59E0B; display:block; margin-top:50px; font-weight:700;">&larr; Back to Growth Engine</a>
    </div>

    <script>
        async function loadAbout() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/system/public`);
                const data = await res.json();
                document.getElementById('content').innerHTML = data.aboutUs || 'The story of an autonomous revolution.';
            } catch(e) { console.error("Failed to load About."); }
        }
        loadAbout();
    </script>
</body>
</html>
